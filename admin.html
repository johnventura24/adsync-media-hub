<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - User Management</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            color: white;
        }

        .admin-header h1 {
            margin: 0;
            font-size: 2rem;
        }

        .admin-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .nav-button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .nav-button.active {
            background: #667eea;
            color: white;
        }

        .nav-button:not(.active) {
            background: #f8f9fa;
            color: #333;
        }

        .nav-button:hover {
            opacity: 0.8;
        }

        .content-section {
            display: none;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .content-section.active {
            display: block;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .users-table th,
        .users-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .users-table th {
            background: #f8f9fa;
            font-weight: 600;
        }

        .users-table tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-active {
            background: #d4edda;
            color: #155724;
        }

        .status-inactive {
            background: #f8d7da;
            color: #721c24;
        }

        .role-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .role-admin {
            background: #d1ecf1;
            color: #0c5460;
        }

        .role-owner {
            background: #fff3cd;
            color: #856404;
        }

        .role-member {
            background: #e2e3e5;
            color: #495057;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background-color 0.3s;
        }

        .btn-edit {
            background: #ffc107;
            color: #212529;
        }

        .btn-reset {
            background: #17a2b8;
            color: white;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: none;
            width: 80%;
            max-width: 500px;
            border-radius: 10px;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: black;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .notification {
            padding: 15px;
            margin: 10px 0;
            border-radius: 4px;
            display: none;
        }

        .notification.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .notification.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .search-bar {
            flex-grow: 1;
            max-width: 300px;
        }

        .search-bar input {
            width: 100%;
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .auth-form {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .auth-form h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .teams-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .teams-table th,
        .teams-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .teams-table th {
            background: #f8f9fa;
            font-weight: 600;
        }

        .teams-table tr:hover {
            background: #f8f9fa;
        }

        /* Form Layout Styles */
        .section-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .search-bar {
            flex-grow: 1;
            max-width: 300px;
        }

        .search-bar input {
            width: 100%;
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        /* Modal responsive improvements */
        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            
            .section-actions {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-bar {
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <div id="auth-container" class="auth-form">
        <h2>Admin Login</h2>
        <form id="admin-login-form">
            <div class="form-group">
                <label for="admin-email">Email</label>
                <input type="email" id="admin-email" required>
            </div>
            <div class="form-group">
                <label for="admin-password">Password</label>
                <input type="password" id="admin-password" required>
            </div>
            <div class="form-buttons">
                <button type="submit" class="btn-primary">Login</button>
            </div>
        </form>
        <div id="auth-notification" class="notification"></div>
    </div>

    <div id="admin-panel" class="admin-container" style="display: none;">
        <div class="admin-header">
            <h1>Admin Panel</h1>
            <div>
                <span id="admin-user-info"></span>
                <button onclick="logout()" class="btn-secondary">Logout</button>
            </div>
        </div>

        <div class="admin-nav">
            <button class="nav-button active" onclick="showSection('users')">Users</button>
            <button class="nav-button" onclick="showSection('teams')">Teams</button>
        </div>

        <div id="notification" class="notification"></div>

        <div id="users-section" class="content-section active">
            <h2>User Management</h2>
            <div class="section-actions">
                <button id="create-user-btn" class="btn btn-primary" onclick="openCreateUserModal()">
                    <i class="fas fa-plus"></i> Create New User
                </button>
                <div class="search-bar">
                    <input type="text" id="user-search" placeholder="Search users by name, email, or username...">
                </div>
            </div>
            <div id="users-container">
                <table class="users-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Teams</th>
                            <th>Last Login</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body">
                        <!-- Users will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>

        <div id="teams-section" class="content-section">
            <h2>Team Management</h2>
            <div id="teams-container">
                <table class="teams-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Owner</th>
                            <th>Members</th>
                            <th>Status</th>
                            <th>Created</th>
                        </tr>
                    </thead>
                    <tbody id="teams-table-body">
                        <!-- Teams will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Create User Modal -->
    <div id="createUserModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('createUserModal')">&times;</span>
            <h2>Create New User</h2>
            <form id="create-user-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="create-first-name">First Name *</label>
                        <input type="text" id="create-first-name" required>
                    </div>
                    <div class="form-group">
                        <label for="create-last-name">Last Name *</label>
                        <input type="text" id="create-last-name" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="create-username">Username *</label>
                        <input type="text" id="create-username" required>
                    </div>
                    <div class="form-group">
                        <label for="create-email">Email *</label>
                        <input type="email" id="create-email" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="create-password">Password *</label>
                        <input type="password" id="create-password" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="create-confirm-password">Confirm Password *</label>
                        <input type="password" id="create-confirm-password" required minlength="6">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="create-user-role">Role</label>
                        <select id="create-user-role">
                            <option value="member">Member</option>
                            <option value="admin">Admin</option>
                            <option value="owner">Owner</option>
                        </select>
                    </div>
                </div>
                <div class="form-buttons">
                    <button type="button" class="btn-secondary" onclick="closeModal('createUserModal')">Cancel</button>
                    <button type="submit" class="btn-primary">Create User</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="editUserModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('editUserModal')">&times;</span>
            <h2>Edit User</h2>
            <form id="edit-user-form">
                <input type="hidden" id="edit-user-id">
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-first-name">First Name</label>
                        <input type="text" id="edit-first-name">
                    </div>
                    <div class="form-group">
                        <label for="edit-last-name">Last Name</label>
                        <input type="text" id="edit-last-name">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-username">Username</label>
                        <input type="text" id="edit-username">
                    </div>
                    <div class="form-group">
                        <label for="edit-email">Email</label>
                        <input type="email" id="edit-email">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-user-role">Role</label>
                        <select id="edit-user-role">
                            <option value="member">Member</option>
                            <option value="admin">Admin</option>
                            <option value="owner">Owner</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-user-status">Status</label>
                        <select id="edit-user-status">
                            <option value="true">Active</option>
                            <option value="false">Inactive</option>
                        </select>
                    </div>
                </div>
                <div class="form-buttons">
                    <button type="button" class="btn-secondary" onclick="closeModal('editUserModal')">Cancel</button>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Reset Password Modal -->
    <div id="resetPasswordModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('resetPasswordModal')">&times;</span>
            <h2>Reset Password</h2>
            <form id="reset-password-form">
                <input type="hidden" id="reset-user-id">
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" required minlength="6">
                </div>
                <div class="form-buttons">
                    <button type="button" class="btn-secondary" onclick="closeModal('resetPasswordModal')">Cancel</button>
                    <button type="submit" class="btn-primary">Reset Password</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentUser = null;
        let authToken = null;
        let users = [];
        let teams = [];

        // Initialize admin panel
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthStatus();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('admin-login-form').addEventListener('submit', handleAdminLogin);
            document.getElementById('edit-user-form').addEventListener('submit', handleEditUser);
            document.getElementById('create-user-form').addEventListener('submit', handleCreateUser);
            document.getElementById('reset-password-form').addEventListener('submit', handleResetPassword);
            document.getElementById('user-search').addEventListener('input', function(e) {
                filterUsers(e.target.value.toLowerCase());
            });

            // Close modals when clicking outside
            window.addEventListener('click', function(e) {
                if (e.target.classList.contains('modal')) {
                    e.target.style.display = 'none';
                }
            });
        }

        async function checkAuthStatus() {
            const token = localStorage.getItem('adminToken');
            if (token) {
                try {
                    const response = await fetch('/api/auth/me', {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data.user.role === 'admin' || data.user.role === 'owner') {
                            currentUser = data.user;
                            authToken = token;
                            showAdminPanel();
                        } else {
                            showNotification('Access denied. Admin privileges required.', 'error');
                            localStorage.removeItem('adminToken');
                        }
                    } else {
                        localStorage.removeItem('adminToken');
                    }
                } catch (error) {
                    console.error('Auth check failed:', error);
                    localStorage.removeItem('adminToken');
                }
            }
        }

        async function handleAdminLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    if (data.user.role === 'admin' || data.user.role === 'owner') {
                        currentUser = data.user;
                        authToken = data.token;
                        localStorage.setItem('adminToken', data.token);
                        showAdminPanel();
                    } else {
                        showNotification('Access denied. Admin privileges required.', 'error', 'auth-notification');
                    }
                } else {
                    showNotification(data.message, 'error', 'auth-notification');
                }
            } catch (error) {
                console.error('Login error:', error);
                showNotification('Login failed. Please try again.', 'error', 'auth-notification');
            }
        }

        function showAdminPanel() {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('admin-user-info').textContent = `Welcome, ${currentUser.firstName} ${currentUser.lastName}`;
            loadUsers();
            loadTeams();
        }

        function logout() {
            localStorage.removeItem('adminToken');
            currentUser = null;
            authToken = null;
            document.getElementById('auth-container').style.display = 'block';
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('admin-login-form').reset();
        }

        function showSection(section) {
            // Update nav buttons
            document.querySelectorAll('.nav-button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Show selected section
            document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));
            document.getElementById(section + '-section').classList.add('active');
        }

        async function loadUsers() {
            try {
                const response = await fetch('/api/admin/users', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    users = data.users;
                    renderUsers(users);
                } else {
                    showNotification('Failed to load users: ' + data.message, 'error');
                }
            } catch (error) {
                console.error('Load users error:', error);
                showNotification('Failed to load users', 'error');
            }
        }

        async function loadTeams() {
            try {
                const response = await fetch('/api/admin/teams', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    teams = data.teams;
                    renderTeams(teams);
                } else {
                    showNotification('Failed to load teams: ' + data.message, 'error');
                }
            } catch (error) {
                console.error('Load teams error:', error);
                showNotification('Failed to load teams', 'error');
            }
        }

        function renderUsers(usersToRender) {
            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = '';
            
            usersToRender.forEach(user => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${user.firstName} ${user.lastName}</td>
                    <td>${user.email}</td>
                    <td>${user.username}</td>
                    <td><span class="role-badge role-${user.role}">${user.role}</span></td>
                    <td><span class="status-badge status-${user.isActive ? 'active' : 'inactive'}">${user.isActive ? 'Active' : 'Inactive'}</span></td>
                    <td>${user.teamCount}</td>
                    <td>${user.lastLogin ? new Date(user.lastLogin).toLocaleDateString() : 'Never'}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-edit" onclick="editUser(${user.id})">Edit</button>
                            <button class="btn btn-reset" onclick="resetPassword(${user.id})">Reset Password</button>
                            <button class="btn btn-delete" onclick="deleteUser(${user.id})">Delete</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function renderTeams(teamsToRender) {
            const tbody = document.getElementById('teams-table-body');
            tbody.innerHTML = '';
            
            teamsToRender.forEach(team => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${team.name}</td>
                    <td>${team.description || 'No description'}</td>
                    <td>${team.ownerUsername} (${team.ownerEmail})</td>
                    <td>${team.memberCount}</td>
                    <td><span class="status-badge status-${team.isActive ? 'active' : 'inactive'}">${team.isActive ? 'Active' : 'Inactive'}</span></td>
                    <td>${new Date(team.createdAt).toLocaleDateString()}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function filterUsers(query) {
            const filteredUsers = users.filter(user => 
                user.firstName.toLowerCase().includes(query) ||
                user.lastName.toLowerCase().includes(query) ||
                user.email.toLowerCase().includes(query) ||
                user.username.toLowerCase().includes(query)
            );
            renderUsers(filteredUsers);
        }

        function editUser(userId) {
            const user = users.find(u => u.id === userId);
            if (user) {
                document.getElementById('edit-user-id').value = userId;
                document.getElementById('edit-first-name').value = user.firstName;
                document.getElementById('edit-last-name').value = user.lastName;
                document.getElementById('edit-username').value = user.username;
                document.getElementById('edit-email').value = user.email;
                document.getElementById('edit-user-role').value = user.role;
                document.getElementById('edit-user-status').value = user.isActive.toString();
                document.getElementById('editUserModal').style.display = 'block';
            }
        }

        function resetPassword(userId) {
            document.getElementById('reset-user-id').value = userId;
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
            document.getElementById('resetPasswordModal').style.display = 'block';
        }

        async function deleteUser(userId) {
            const user = users.find(u => u.id === userId);
            if (user && confirm(`Are you sure you want to delete user "${user.firstName} ${user.lastName}"? This action cannot be undone.`)) {
                try {
                    const response = await fetch(`/api/admin/users/${userId}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${authToken}`
                        }
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        showNotification('User deleted successfully', 'success');
                        loadUsers();
                    } else {
                        showNotification('Failed to delete user: ' + data.message, 'error');
                    }
                } catch (error) {
                    console.error('Delete user error:', error);
                    showNotification('Failed to delete user', 'error');
                }
            }
        }

        async function handleEditUser(e) {
            e.preventDefault();
            
            const userId = document.getElementById('edit-user-id').value;
            const firstName = document.getElementById('edit-first-name').value;
            const lastName = document.getElementById('edit-last-name').value;
            const username = document.getElementById('edit-username').value;
            const email = document.getElementById('edit-email').value;
            const role = document.getElementById('edit-user-role').value;
            const isActive = document.getElementById('edit-user-status').value === 'true';
            
            try {
                const response = await fetch(`/api/admin/users/${userId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ firstName, lastName, username, email, role, isActive })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showNotification('User updated successfully', 'success');
                    closeModal('editUserModal');
                    loadUsers();
                } else {
                    showNotification('Failed to update user: ' + data.message, 'error');
                }
            } catch (error) {
                console.error('Edit user error:', error);
                showNotification('Failed to update user', 'error');
            }
        }

        async function handleResetPassword(e) {
            e.preventDefault();
            
            const userId = document.getElementById('reset-user-id').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (newPassword !== confirmPassword) {
                showNotification('Passwords do not match', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showNotification('Password must be at least 6 characters long', 'error');
                return;
            }

            try {
                const response = await fetch(`/api/admin/users/${userId}/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ newPassword })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showNotification('Password reset successfully', 'success');
                    closeModal('resetPasswordModal');
                } else {
                    showNotification('Failed to reset password: ' + data.message, 'error');
                }
            } catch (error) {
                console.error('Reset password error:', error);
                showNotification('Failed to reset password', 'error');
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function showNotification(message, type, containerId = 'notification') {
            const notification = document.getElementById(containerId);
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 5000);
        }

        function openCreateUserModal() {
            document.getElementById('create-user-form').reset();
            document.getElementById('createUserModal').style.display = 'block';
        }

        async function handleCreateUser(e) {
            e.preventDefault();
            
            const firstName = document.getElementById('create-first-name').value;
            const lastName = document.getElementById('create-last-name').value;
            const username = document.getElementById('create-username').value;
            const email = document.getElementById('create-email').value;
            const password = document.getElementById('create-password').value;
            const role = document.getElementById('create-user-role').value;
            
            if (password !== document.getElementById('create-confirm-password').value) {
                showNotification('Passwords do not match', 'error');
                return;
            }

            try {
                const response = await fetch('/api/admin/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ firstName, lastName, username, email, password, role })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showNotification('User created successfully', 'success');
                    closeModal('createUserModal');
                    loadUsers();
                } else {
                    showNotification('Failed to create user: ' + data.message, 'error');
                }
            } catch (error) {
                console.error('Create user error:', error);
                showNotification('Failed to create user', 'error');
            }
        }
    </script>
